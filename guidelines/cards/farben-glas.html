<!-- @dsCard group="Farben" viewport="700x200" name="Glas-Tints" subtitle="Tint nach Bildhelligkeit — dunkel oder hell, immer Hairline" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { width: 700px; height: 200px; background: url("../../assets/photos/hufhaus-pool-abend.jpg") center 70% / cover; display: flex; align-items: center; gap: 16px; padding: 0 16px; box-sizing: border-box; }
  .g { flex: 1; height: 150px; border-radius: var(--r-card); padding: 14px 16px; display: flex; flex-direction: column; justify-content: flex-end; gap: 2px; }
  .n { font: 500 14px var(--font-display); }
  .v { font: 10px var(--font-mono); opacity: 0.7; }
</style>
</head>
<body>
  <div class="g" style="background: var(--glass-dark); backdrop-filter: blur(var(--blur-panel)); -webkit-backdrop-filter: blur(var(--blur-panel)); box-shadow: inset 0 0 0 1px var(--hairline-light); color: var(--text-inverse);">
    <span class="n">--glass-dark</span><span class="v">rgba(10,9,8,.42) · blur 28</span>
  </div>
  <div class="g" style="background: var(--glass-dark-2); backdrop-filter: blur(var(--blur-panel)); -webkit-backdrop-filter: blur(var(--blur-panel)); box-shadow: inset 0 0 0 1px var(--hairline-light); color: var(--text-inverse);">
    <span class="n">--glass-dark-2</span><span class="v">rgba(10,9,8,.64)</span>
  </div>
  <div class="g" style="background: var(--glass-light); backdrop-filter: blur(var(--blur-panel)); -webkit-backdrop-filter: blur(var(--blur-panel)); box-shadow: inset 0 0 0 1px var(--hairline-light-strong); color: var(--ink-2);">
    <span class="n">--glass-light</span><span class="v">rgba(247,245,241,.42)</span>
  </div>
  <div class="g" style="background: var(--glass-light-2); backdrop-filter: blur(var(--blur-panel)); -webkit-backdrop-filter: blur(var(--blur-panel)); box-shadow: inset 0 0 0 1px var(--hairline-light-strong); color: var(--ink-2);">
    <span class="n">--glass-light-2</span><span class="v">rgba(247,245,241,.72)</span>
  </div>
</body>
</html>
