<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { width: 700px; height: 170px; background: var(--ink); color: var(--text-inverse); padding: 22px 28px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .row { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--hairline-light); padding-bottom: 10px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--signal); margin-right: 9px; }
</style>
</head>
<body class="u-grain">
  <div class="row">
    <span class="u-label" style="color: var(--text-inverse-muted);"><span class="dot"></span>Nachfrage-Score</span>
    <span style="font: 14px var(--font-mono);">94 / 100</span>
  </div>
  <div class="row">
    <span class="u-label" style="color: var(--text-inverse-muted);">Preis / m²</span>
    <span style="font: 14px var(--font-mono);">6 240 €</span>
  </div>
  <div class="row" style="border: none; padding: 0;">
    <span class="u-label" style="color: var(--text-inverse-muted);">48.1954° N · 16.2891° O</span>
    <span class="u-label" style="color: var(--signal);">Pipeline — Q3</span>
  </div>
</body>
</html>
