<!DOCTYPE html>

<head>

<link rel="stylesheet" href="../../styles.css">
<style>
  body { width: 700px; height: 300px; background: var(--paper); padding: 20px 28px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
  .r { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid var(--hairline-dark); padding: 6px 0; }
  .t { font-family: var(--font-display); color: var(--ink); letter-spacing: -0.03em; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .k { font: 10px var(--font-mono); color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; flex: none; width: 150px; }
</style>
</head>
<body>
  <div class="r"><span class="k">hero · clamp→148</span><span class="t" style="font-size: 58px; font-weight: 500;">Raum. Technologie.</span></div>
