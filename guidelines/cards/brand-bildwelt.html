<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { width: 700px; height: 200px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: var(--ink); }
  img { width: 100%; height: 100%; object-fit: cover; display: block; }
  figure { margin: 0; position: relative; overflow: hidden; }
  figcaption { position: absolute; left: 8px; bottom: 6px; font: 9px var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.85); text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
</style>
</head>
<body>
  <figure><img src="../../assets/photos/terrasse-golden.png" alt=""><figcaption>golden hour</figcaption></figure>
  <figure><img src="../../assets/photos/interieur-esszimmer.jpg" alt=""><figcaption>interieur</figcaption></figure>
  <figure><img src="../../assets/photos/fassade-historisch.png" alt=""><figcaption>fassade</figcaption></figure>
  <figure><img src="../../assets/photos/drohne-wienerwald.jpg" alt=""><figcaption>drohne</figcaption></figure>
  <figure><img src="../../assets/photos/villen-abend.jpg" alt=""><figcaption>abendlicht</figcaption></figure>
</body>
</html>
