<!-- @dsCard group="Material" viewport="700x190" name="Hairlines & Schatten" subtitle="1px-Linien statt Borders, weiche Diffusion statt shadow-md" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { width: 700px; height: 190px; background: var(--paper-2); display: flex; align-items: center; justify-content: center; gap: 26px; }
  .box { width: 190px; height: 120px; border-radius: var(--r-card); background: var(--surface-raised); display: flex; align-items: flex-end; padding: 12px 14px; box-sizing: border-box; }
  .k { font: 10px var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="box" style="box-shadow: inset 0 0 0 1px var(--hairline-dark);"><span class="k">hairline-dark · 1px 14 %</span></div>
  <div class="box" style="box-shadow: var(--shadow-float);"><span class="k">--shadow-float</span></div>
  <div class="box" style="box-shadow: var(--shadow-soft);"><span class="k">--shadow-soft</span></div>
</body>
</html>
