<!-- @dsCard group="Farben" viewport="700x170" name="Basis-Neutrals" subtitle="Warmes Off-White + warmes Tiefschwarz — nie rein" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { display: flex; width: 700px; height: 170px; }
  .sw { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; justify-content: flex-end; gap: 2px; }
  .n { font: 500 14px var(--font-display); }
  .v { font: 11px var(--font-mono); opacity: 0.65; }
</style>
</head>
<body>
  <div class="sw" style="background: var(--paper);"><span class="n">--paper</span><span class="v">#F7F5F1</span></div>
  <div class="sw" style="background: var(--paper-2);"><span class="n">--paper-2</span><span class="v">#F0EDE6</span></div>
  <div class="sw" style="background: var(--paper-3);"><span class="n">--paper-3</span><span class="v">#E7E2D8</span></div>
  <div class="sw" style="background: var(--ink-3); color: var(--text-inverse);"><span class="n">--ink-3</span><span class="v">#383429</span></div>
  <div class="sw" style="background: var(--ink-2); color: var(--text-inverse);"><span class="n">--ink-2</span><span class="v">#1B1A16</span></div>
  <div class="sw" style="background: var(--ink); color: var(--text-inverse);"><span class="n">--ink</span><span class="v">#0B0A09</span></div>
</body>
</html>
